<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Learning</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ABC Learning</h1>

<div class="container">

    <div class="card" onclick="speak('A for Aeroplane')">
        <img src="images/aeroplane.jpg" alt="Aeroplane">
        <h2>A - Aeroplane</h2>
    </div>

    <div class="card" onclick="speak('B for Bat')">
        <img src="images/bat.jpg" alt="Bat">
        <h2>B - Bat</h2>
    </div>

    <div class="card" onclick="speak('C for Cat')">
        <img src="images/cat.jpg" alt="Cat">
        <h2>C - Cat</h2>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
